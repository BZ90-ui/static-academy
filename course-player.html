<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Commerce — STATIC Academy</title>
  <style>
    :root{
      --bg:#04050f;--bg2:#080a1a;--bg3:#0d1028;--bg4:#131830;
      --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
      --text:#f0f2ff;--muted:#6b7299;--txt2:#a0aec0;
      --accent:#818cf8;--accent2:#7c52e8;--accent3:#4f6ef7;
      --pro:#818cf8;--elite:#c9a84c;--free:#4ade80;
      --glow:rgba(129,140,248,.15);
      --sidebar:272px;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;}

    /* ── TOP BAR ── */
    .topbar{height:60px;background:rgba(8,10,26,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;gap:12px;z-index:50;backdrop-filter:blur(12px);}
    .topbar-left{display:flex;align-items:center;gap:14px;}
    .back-btn{color:var(--muted);text-decoration:none;font-size:.82rem;display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);transition:all .2s;}
    .back-btn:hover{color:var(--text);border-color:rgba(129,140,248,.4);}
    .logo{font-size:1rem;font-weight:900;display:flex;align-items:center;gap:10px;}
    .logo-dot{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-dot img,.logo-dot svg{width:36px;height:36px;}
    .logo-txt{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .course-title{font-size:.82rem;color:var(--muted);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:4px 10px;background:rgba(255,255,255,.04);border-radius:6px;}
    .topbar-right{display:flex;align-items:center;gap:12px;}
    .prog-wrap{width:120px;height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;}
    .prog-fill{height:100%;background:linear-gradient(90deg,var(--accent3),var(--accent));border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);}
    .prog-txt{font-size:.74rem;color:var(--muted);font-weight:600;}
    .plan-badge{padding:4px 12px;border-radius:999px;font-size:.68rem;font-weight:800;letter-spacing:.04em;}
    .badge-free{background:rgba(74,222,128,.12);color:var(--free);border:1px solid rgba(74,222,128,.2);}
    .badge-pro{background:rgba(129,140,248,.12);color:var(--pro);border:1px solid rgba(129,140,248,.2);}
    .badge-elite{background:rgba(201,168,76,.12);color:var(--elite);border:1px solid rgba(201,168,76,.2);}
    .badge-admin{background:rgba(16,185,129,.12);color:#10b981;border:1px solid rgba(16,185,129,.2);}
    .upgrade-btn{background:linear-gradient(135deg,var(--accent3),var(--accent2));color:#fff;border:none;padding:7px 16px;border-radius:9px;font-weight:700;cursor:pointer;font-size:.8rem;white-space:nowrap;box-shadow:0 4px 14px rgba(124,82,232,.3);transition:opacity .2s;}
    .upgrade-btn:hover{opacity:.85;}

    /* ── LAYOUT ── */
    .main{display:flex;flex:1;overflow:hidden;}

    /* ── SIDEBAR ── */
    .sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
    .sb-head{padding:14px 16px;border-bottom:1px solid var(--border);}
    .sb-course-pill{display:flex;align-items:center;gap:10px;padding:10px 12px;background:linear-gradient(135deg,rgba(79,110,247,.12),rgba(124,82,232,.08));border:1px solid rgba(79,110,247,.2);border-radius:12px;margin-bottom:10px;}
    .sb-course-pill .cp-icon{font-size:1.3rem;}
    .sb-course-pill .cp-label{font-size:.78rem;font-weight:700;color:var(--accent);}
    .sb-course-pill .cp-sub{font-size:.68rem;color:var(--muted);}
    .sb-search{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;}
    .sb-search input{background:none;border:none;color:var(--text);font-size:.83rem;outline:none;width:100%;}
    .sb-search input::placeholder{color:var(--muted);}
    .sb-nav{overflow-y:auto;flex:1;padding:8px 0;}
    .sb-nav::-webkit-scrollbar{width:3px;}
    .sb-nav::-webkit-scrollbar-thumb{background:rgba(129,140,248,.2);border-radius:2px;}

    /* Module */
    .mod-block{margin-bottom:2px;}
    .mod-hdr{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;user-select:none;transition:background .15s;}
    .mod-hdr:hover{background:rgba(255,255,255,.03);}
    .mod-arrow{font-size:.6rem;color:var(--muted);transition:transform .25s;flex-shrink:0;}
    .mod-arrow.open{transform:rotate(90deg);}
    .mod-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
    .mod-icon.ic-free{background:rgba(74,222,128,.1);}
    .mod-icon.ic-pro{background:rgba(129,140,248,.1);}
    .mod-icon.ic-elite{background:rgba(201,168,76,.1);}
    .mod-name{font-size:.84rem;font-weight:700;flex:1;line-height:1.3;}
    .mod-badge{font-size:.58rem;font-weight:800;padding:2px 7px;border-radius:999px;flex-shrink:0;letter-spacing:.04em;}
    .mb-free{background:rgba(74,222,128,.12);color:var(--free);border:1px solid rgba(74,222,128,.15);}
    .mb-pro{background:rgba(129,140,248,.12);color:var(--pro);border:1px solid rgba(129,140,248,.15);}
    .mb-elite{background:rgba(201,168,76,.12);color:var(--elite);border:1px solid rgba(201,168,76,.15);}
    .mod-lessons{display:none;}
    .mod-lessons.open{display:block;}

    /* Lesson row */
    .les-row{display:flex;align-items:center;gap:8px;padding:8px 14px 8px 38px;cursor:pointer;transition:all .15s;font-size:.81rem;color:var(--muted);border-left:3px solid transparent;position:relative;}
    .les-row:hover{background:rgba(255,255,255,.03);color:var(--text);}
    .les-row.active{background:rgba(129,140,248,.08);color:var(--text);border-left-color:var(--accent);}
    .les-row.active .les-chk{box-shadow:0 0 8px rgba(129,140,248,.3);}
    .les-row.locked{opacity:.45;cursor:not-allowed;}
    .les-chk{width:17px;height:17px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem;transition:all .2s;}
    .les-chk.done{background:linear-gradient(135deg,var(--accent3),var(--accent));border-color:transparent;color:#fff;}
    .les-dur{font-size:.68rem;color:var(--muted);flex-shrink:0;margin-left:auto;}
    .les-lock{font-size:.68rem;flex-shrink:0;}

    /* ── CONTENT ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    @keyframes shimmer{0%,100%{opacity:.6;}50%{opacity:1;}}
    .content-wrap{flex:1;overflow-y:auto;position:relative;background:var(--bg);}
    .content-wrap::-webkit-scrollbar{width:5px;}
    .content-wrap::-webkit-scrollbar-thumb{background:rgba(129,140,248,.2);border-radius:3px;}

    /* Lesson hero */
    .lesson-hero{background:linear-gradient(135deg,rgba(79,110,247,.1) 0%,rgba(124,82,232,.08) 60%,rgba(0,0,0,0) 100%);border-bottom:1px solid var(--border);padding:36px 48px 28px;position:relative;overflow:hidden;}
    .lesson-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(129,140,248,.08),transparent 70%);pointer-events:none;}
    .lesson-hero::after{content:'';position:absolute;bottom:-60px;left:200px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(124,82,232,.06),transparent 70%);pointer-events:none;}
    .lesson-hero h1{font-size:1.85rem;font-weight:900;letter-spacing:-.5px;margin-bottom:10px;line-height:1.2;}
    .lesson-hero h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .lesson-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
    .lesson-meta .lm-pill{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:50px;padding:4px 10px;}
    .lm-badge{padding:4px 11px;border-radius:999px;font-size:.68rem;font-weight:800;letter-spacing:.04em;}

    /* Lesson body */
    .lesson-pane{padding:32px 48px 48px;max-width:900px;width:100%;margin:0 auto;animation:fadeUp .35s ease;}
    .lesson-body{line-height:1.82;font-size:.93rem;}
    .lesson-body h2{font-size:1.1rem;font-weight:800;margin:34px 0 12px;color:var(--accent);display:flex;align-items:center;gap:10px;}
    .lesson-body h2::before{content:'';display:inline-block;width:4px;height:1.2em;background:linear-gradient(180deg,var(--accent3),var(--accent2));border-radius:3px;flex-shrink:0;}
    .lesson-body h3{font-size:.97rem;font-weight:700;margin:22px 0 8px;color:rgba(240,242,255,.92);}
    .lesson-body p{margin-bottom:14px;color:rgba(240,242,255,.75);}
    .lesson-body ul,.lesson-body ol{padding-left:0;margin-bottom:16px;display:flex;flex-direction:column;gap:8px;list-style:none;}
    .lesson-body li{color:rgba(240,242,255,.75);padding-left:22px;position:relative;}
    .lesson-body ul li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:.75rem;top:2px;}
    .lesson-body ol{counter-reset:li;}
    .lesson-body ol li::before{counter-increment:li;content:counter(li);position:absolute;left:0;width:18px;height:18px;background:rgba(129,140,248,.15);border:1px solid rgba(129,140,248,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;color:var(--accent);top:1px;}
    .lesson-body strong{color:var(--text);}
    .lesson-body em{color:var(--accent);font-style:normal;font-weight:600;}
    .lesson-body code{background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.15);padding:2px 8px;border-radius:6px;font-family:monospace;font-size:.85em;color:var(--accent);}

    /* Callout boxes */
    .tip-box{background:linear-gradient(135deg,rgba(129,140,248,.07),rgba(124,82,232,.05));border:1px solid rgba(129,140,248,.2);border-radius:14px;padding:18px 20px;margin:22px 0;position:relative;overflow:hidden;}
    .tip-box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--accent3),var(--accent2));}
    .tip-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
    .warn-box{background:linear-gradient(135deg,rgba(244,196,48,.06),rgba(251,191,36,.04));border:1px solid rgba(244,196,48,.2);border-radius:14px;padding:18px 20px;margin:22px 0;position:relative;overflow:hidden;}
    .warn-box::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,#f4c430,#f59e0b);}
    .warn-box .tip-label{color:#fbbf24;}

    /* Tables */
    .lesson-body table{width:100%;border-collapse:separate;border-spacing:0;margin:22px 0;font-size:.86rem;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .lesson-body th{background:rgba(255,255,255,.04);padding:11px 16px;text-align:left;font-size:.76rem;color:var(--txt2);border-bottom:1px solid var(--border);font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
    .lesson-body td{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(240,242,255,.72);}
    .lesson-body tr:last-child td{border-bottom:none;}
    .lesson-body tr:hover td{background:rgba(255,255,255,.025);}

    /* ── VIDEO CARDS ── */
    .video-row{display:flex;flex-wrap:wrap;gap:14px;margin:26px 0;}
    .video-card{width:270px;flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative;}
    .video-card:hover{border-color:rgba(255,0,0,.3);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.3);}
    .video-thumb{position:relative;width:100%;height:148px;background:linear-gradient(135deg,#0e0e0e,#1a1a1a);overflow:hidden;display:flex;align-items:center;justify-content:center;}
    .video-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .3s;opacity:0.85;}
    .video-thumb img.thumb-hidden{display:none;}
    .video-card:hover .video-thumb img{transform:scale(1.04);}
    .play-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.45);gap:8px;}
    .play-btn{width:52px;height:52px;border-radius:50%;background:#cc0000;display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#fff;font-weight:900;box-shadow:0 4px 18px rgba(200,0,0,.45);transition:transform .2s,background .2s;}
    .video-card:hover .play-btn{transform:scale(1.12);background:#e50000;}
    .play-label{font-size:.65rem;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
    .video-thumb-fallback{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:linear-gradient(135deg,#0f0f0f,#1c1c1c);}
    .video-thumb-fallback span{font-size:2rem;}
    .video-thumb-fallback p{font-size:.7rem;color:rgba(255,255,255,.4);}
    .video-info{padding:12px 14px;}
    .video-title{font-size:.82rem;font-weight:600;line-height:1.4;margin-bottom:8px;color:var(--text);}
    .yt-link{display:inline-flex;align-items:center;gap:5px;font-size:.7rem;color:var(--accent);text-decoration:none;font-weight:600;}
    .yt-link:hover{text-decoration:underline;}
    .yt-link svg{width:12px;height:12px;}

    /* ── MINI PLAYER ── */
    .mini-player{position:fixed;bottom:24px;right:24px;width:320px;background:#0b0c14;border:1px solid rgba(255,255,255,.13);border-radius:18px;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.04);z-index:300;transform:translateY(calc(100% + 32px));opacity:0;transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .32s ease;pointer-events:none;}
    .mini-player.open{transform:translateY(0);opacity:1;pointer-events:all;}
    .mp-thumb{position:relative;width:100%;aspect-ratio:16/9;background:#111;overflow:hidden;cursor:pointer;}
    .mp-thumb img{width:100%;height:100%;object-fit:cover;display:block;filter:brightness(.72);transition:transform .3s,filter .3s;}
    .mp-thumb:hover img{transform:scale(1.04);filter:brightness(.5);}
    .mp-thumb-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;}
    .mp-play-circle{width:58px;height:58px;border-radius:50%;background:rgba(204,0,0,.95);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;box-shadow:0 6px 28px rgba(0,0,0,.75);transition:transform .2s;}
    .mp-thumb:hover .mp-play-circle{transform:scale(1.12);}
    .mp-search-hint{font-size:.6rem;color:rgba(255,255,255,.75);font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-shadow:0 1px 6px rgba(0,0,0,.9);}
    .mp-bar{padding:11px 14px;display:flex;align-items:center;gap:10px;background:#0b0c14;}
    .mp-info{flex:1;min-width:0;}
    .mp-title{font-size:.82rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
    .mp-subtitle{font-size:.6rem;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.06em;font-weight:600;}
    .mp-yt-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:#cc0000;color:#fff;border-radius:8px;text-decoration:none;font-size:.72rem;font-weight:700;flex-shrink:0;white-space:nowrap;transition:background .2s,transform .15s;box-shadow:0 3px 12px rgba(200,0,0,.4);}
    .mp-yt-btn:hover{background:#aa0000;transform:scale(1.04);}
    .mp-close{position:absolute;top:9px;right:9px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.18);color:#fff;font-size:.75rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .2s;line-height:1;}
    .mp-close:hover{background:rgba(255,255,255,.2);}

    /* ── LOCK ── */
    .lock-overlay{position:absolute;inset:0;background:rgba(4,5,15,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;z-index:5;backdrop-filter:blur(14px) saturate(1.2);}
    .lock-overlay .lock-icon{width:56px;height:56px;border-radius:16px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.22);display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:20px;animation:shimmer 2.5s ease-in-out infinite;}
    .lock-overlay h3{font-size:1.1rem;font-weight:800;margin-bottom:8px;letter-spacing:-.01em;}
    .lock-overlay p{color:var(--muted);font-size:.85rem;line-height:1.65;margin-bottom:28px;max-width:340px;}
    .lock-overlay .unlock-btn{background:linear-gradient(135deg,var(--accent3),var(--accent2));color:#fff;border:none;padding:12px 32px;border-radius:12px;font-weight:700;cursor:pointer;font-size:.88rem;box-shadow:0 6px 20px rgba(124,82,232,.28);letter-spacing:.01em;transition:opacity .2s,transform .2s;}
    .lock-overlay .unlock-btn:hover{opacity:.88;transform:translateY(-1px);}

    /* ── LESSON NAV ── */
    .lesson-nav{display:flex;justify-content:space-between;align-items:center;margin-top:48px;padding:20px 0;border-top:1px solid var(--border);gap:12px;}
    .nav-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:11px;color:var(--text);cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;text-decoration:none;}
    .nav-btn:hover{border-color:rgba(129,140,248,.4);background:rgba(129,140,248,.06);}
    .nav-btn.primary{background:linear-gradient(135deg,var(--accent3),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(124,82,232,.3);}
    .nav-btn.primary:hover{opacity:.88;}
    .mark-done{display:flex;align-items:center;gap:8px;padding:10px 22px;background:rgba(129,140,248,.08);border:1px solid rgba(129,140,248,.2);border-radius:11px;color:var(--accent);cursor:pointer;font-size:.85rem;font-weight:700;transition:all .2s;}
    .mark-done:hover{background:rgba(129,140,248,.15);}
    .mark-done.done{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.2);color:#4ade80;}

    /* ── Mobile sidebar toggle ── */
    .sb-toggle{display:none;flex-direction:column;gap:5px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;cursor:pointer;padding:8px 10px;flex-shrink:0;transition:background .2s,border-color .2s;}
    .sb-toggle:hover{background:rgba(255,255,255,.1);border-color:rgba(129,140,248,.35);}
    .sb-toggle span{display:block;width:18px;height:2px;background:var(--text);border-radius:2px;transition:all .25s;}
    .sb-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
    .sb-toggle.open span:nth-child(2){opacity:0;}
    .sb-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

    /* ── Sidebar backdrop ── */
    .sb-overlay{display:none;position:fixed;inset:0;top:60px;background:rgba(0,0,0,.65);z-index:149;backdrop-filter:blur(2px);}
    .sb-overlay.open{display:block;}

    @media(max-width:768px){
      .sb-toggle{display:flex;}
      .course-title{display:none;}
      .prog-wrap{width:72px;}
      .prog-txt{display:none;}
      /* Sidebar as slide-in drawer */
      .sidebar{
        display:flex;
        position:fixed;
        top:60px;left:0;bottom:0;
        width:min(85vw,300px);
        z-index:150;
        transform:translateX(-100%);
        transition:transform .3s cubic-bezier(.4,0,.2,1);
        box-shadow:8px 0 40px rgba(0,0,0,.6);
      }
      .sidebar.open{transform:translateX(0);}
      .lesson-hero{padding:20px 16px 16px;}
      .lesson-pane{padding:20px 16px calc(40px + env(safe-area-inset-bottom));}

      /* Touch polish */
      *{-webkit-tap-highlight-color:transparent}
      a,button,[role="button"]{touch-action:manipulation}
      input,select,textarea{font-size:16px!important}
      .nav-btn:active,.mark-done:active{opacity:.8;transform:scale(.97)!important;transition:transform .08s ease,opacity .08s ease!important}
      .les-row:active{background:rgba(255,255,255,.06)!important}
      .sb-toggle:active{opacity:.7}
      .mod-header:active{background:rgba(255,255,255,.04)}
      .topbar{padding-bottom:env(safe-area-inset-top)}

kTok, SEO, influenceurs)</li><li><strong>Taux de conversion</strong> : 2-5% des visiteurs achètent (design, descriptions, preuves sociales, urgence)</li><li><strong>Valeur panier (AOV)</strong> : upsells, bundles, cross-sells pour augmenter chaque commande</li><li><strong>Rétention client</strong> : email marketing, programme fidélité, remarketing pour que les clients reviennent</li></ol><table><thead><tr><th>Métrique</th><th>Débutant</th><th>Intermédiaire</th><th>Expert</th></tr></thead><tbody><tr><td>Taux de conversion</td><td>0.5-1%</td><td>1.5-2.5%</td><td>3-5%+</td></tr><tr><td>ROAS Meta Ads</td><td>1-2x</td><td>2.5-4x</td><td>5x+</td></tr><tr><td>Panier moyen (AOV)</td><td>30-50€</td><td>50-100€</td><td>100€+</td></tr><tr><td>Marge nette</td><td>5-10%</td><td>15-25%</td><td>30%+</td></tr></tbody></table><div class="warn-box"><div class="tip-label">⚠️ L'erreur n°1 des débutants</div><p>La plupart se focalisent uniquement sur le trafic. Mais si ton taux de conversion est 0.5%, même 10 000 visiteurs/mois ne génèrent que 50 ventes. Optimise d'abord la boutique AVANT d'investir en pub.</p></div><h2>Plan d'action semaine 1</h2><ol><li>Crée un compte Shopify (essai gratuit 3 jours, puis 1$/mois pendant 3 mois)</li><li>Rejoint les groupes Facebook : Dropshipping France Officiel, E-commerce Mastery FR</li><li>Installe l'extension Minea ou EcomHunt pour l'espionnage publicitaire</li><li>Ouvre un compte TikTok Business et commence à observer les tendances</li><li>Note 10 niches potentielles qui ont une communauté passionnée</li></ol>
<h2>📊 Les chiffres qui confirment l'opportunité</h2>

ntify TikTok hashtags with 500M+ views in a specific niche</li><li>Note INDEPENDENT brands crushing it in that niche (proof of solvable demand)</li></ol><div class="warn-box"><div class="tip-label">⚠️ Common pitfall</div><p>Don't choose a niche just because it interests you. The question isn't 'do I love this?' but 'are people ALREADY paying for this?'</p></div><h2>Practical exercise</h2><ol><li>List 20 niches in 10 minutes (quick brainstorm)</li><li>Apply the 5 filters to each</li><li>Keep the top 3</li><li>For each, find 5 products on AliExpress with 4+ stars and 500+ orders</li><li>Pick your final niche and move to the next module</li></ol>`

n vers un vrai actif commercial valorisable.</p><ol><li>Trouve un produit qui se vend bien sur AliExpress</li><li>Contacte le fabricant sur Alibaba pour une commande minimum (MOQ 100-500 unités)</li><li>Fais créer un logo et packaging sur Fiverr/Canva (~150€)</li><li>Commande un échantillon (50-200€) pour valider la qualité</li><li>Lance la première commande (1 500-5 000€)</li></ol><div class="warn-box"><div class="tip-label">⚠️ Capital requis</div><p>Ne te lance pas en marque privée avec moins de 3 000€. Tu dois absorber la commande initiale, les pubs de lancement et les remboursements éventuels.</p></div><h2>3. Print-on-Demand — créativité sans risque</h2><p>Avec Printful ou Printify, tu crées des designs (t-shirts, mugs, tote bags) imprimés et expédiés à la demande. Zéro stock, zéro avance.</p><table><thead><tr><th>Plateforme</th><th>Intégration</th><th>Livraison EU</th><th>Marge moyenne</th></tr></thead><tbody><tr><td>Printful</td><td>Shopify, Etsy, WooCommerce</td><td>7-10 jours</td><td>30-45%</td></tr><tr><td>Printify</td><td>Shopify, Etsy</td><td>5-12 jours</td><td>35-50%</td></tr><tr><td>SPOD</td><td>Shopify</td><td>3-5 jours</td><td>25-40%</td></tr></tbody></table><h2>Quelle stratégie selon ton profil ?</h2><table><thead><tr><th>Profil</th><th>Recommandation</th><th>Budget départ</th></tr></thead><tbody><tr><td>< 500€ de capital</td><td>POD ou dropshipping AliExpress</td><td>300-500€</td></tr><tr><td>500-2 000€</td><td>Dropshipping EU + branding basique</td><td>800-1 500€</td></tr><tr><td>2 000€+</td><td>Marque privée dès le départ</td><td>2 000-5 000€</td></tr></tbody></table>

<h2>🏭 Marque privée : le vrai chemin vers la liberté financière</h2>
<p>La marque privée (private label) consiste à vendre des produits fabriqués par un tiers sous ta propre marque. C'est le modèle le plus difficile à lancer mais le plus rentable à long terme. Une boutique de marque privée bien construite peut se vendre 3 à 5 fois son bénéfice annuel — soit plusieurs centaines de milliers d'euros pour une boutique à 50 000€/an de bénéfice.</p>

<li><strong>Scaling :</strong> Réinvestis 60-70% des profits dans le stock pendant les 12 premiers mois. Augmente les commandes progressivement pour négocier des prix unitaires plus bas.</li>
</ol>

<h2>💰 La TVA en e-commerce : pièges et règles</h2>

<h2>💰 Construire son plan financier e-commerce en 4 étapes</h2>
<p>Un business plan ne doit pas être un document de 50 pages pour impressionner une banque. Pour un e-commerçant solo, c'est un tableau simple qui répond à 4 questions : Combien ça coûte de démarrer ? Combien ça coûte de tourner chaque mois ? Quand vais-je être rentable ? Quel revenu puis-je espérer en année 1 ?</p>

<p><strong>Étape 2 — Coûts fixes mensuels (récurrents) :</strong> Shopify abonnement (29€), apps essentielles (30-80€), email marketing Klaviyo (0€ jusqu'à 250 contacts), outils divers (20-50€). Total charges fixes : 80 à 160€/mois.</p>
<p><strong>Étape 3 — Budget publicité (variable) :</strong> La règle d'or est de prévoir 30 à 40% de ton CA cible en budget pub pendant la phase de test. Si tu vises 3 000€/mois de CA, prévois 900 à 1 200€/mois de pub.</p>

Q produit</strong> : répond aux 5 objections principales (livraison, retour, qualité, utilisation, taille)</li></ol><div class="tip-box"><div class="tip-label">💡 La formule de description</div><p>PROBLÈME → AGITATION → SOLUTION → PREUVE → CTA. Mauvais : 'Semelles orthopédiques 6mm'. Bon : 'Marchez sans douleur toute la journée, même après 8h debout — testé par 12 000 clients.'</p></div><h2>Psychologie des prix</h2><table><thead><tr><th>Technique</th><th>Exemple</th><th>Impact</th></tr></thead><tbody><tr><td>Prix charmant</td><td>39.99€ au lieu de 40€</td><td>+10-15% perception valeur</td></tr><tr><td>Prix ancrage</td><td>~~59€~~ → 34.90€</td><td>+20-30% conversions</td></tr><tr><td>Bundle pricing</td><td>1x 34€ → 3x 79€</td><td>+40-60% AOV</td></tr><tr><td>Urgence</td><td>Stock limité / Timer</td><td>+15-25% conversions</td></tr></tbody></table><h2>Checklist avant publication</h2><ol><li>Titre < 70 caractères (SEO)</li><li>Images > 1200px, format 1:1 ou 4:3</li><li>Description > 300 mots avec mots-clés</li><li>Métabalises SEO remplies</li><li>Avis clients importés (Loox ou Judge.me)</li><li>Test mobile : tout s'affiche correctement ?</li><li>Délai de livraison clairement indiqué</li></ol>

près 50€ dépensés : garde les 2 meilleurs (CPC le plus bas, CTR le plus haut)</li><li>Si aucune vente à 50€ : change le produit ou le créatif</li></ol><p><strong>Phase 2 : Test audiences (budget : 100-200€)</strong></p><ol><li>Duplique les 2 meilleurs créatifs dans 3-4 ensembles de pubs</li><li>Test : Large + Lookalike 1% + Retargeting visiteurs + Intérêts spécifiques</li><li>Garde les audiences avec ROAS > 2.5</li></ol><p><strong>Phase 3 : Scale (budget : 500€+/jour)</strong></p><ol><li>Augmente les budgets gagnants de 20-30% tous les 3 jours</li><li>Lance des Lookalike audiences 2%, 5%, 10%</li><li>Active les campagnes retargeting (visiteurs, add-to-cart, abandon checkout)</li></ol><h2>Métriques Meta Ads à surveiller</h2><table><thead><tr><th>Métrique</th><th>Mauvais</th><th>Correct</th><th>Excellent</th></tr></thead><tbody><tr><td>CTR (taux de clic)</td><td>< 0.8%</td><td>1-2%</td><td>> 2.5%</td></tr><tr><td>CPC (coût par clic)</td><td>> 2€</td><td>0.5-1.5€</td><td>< 0.5€</td></tr><tr><td>CPM (coût 1000 imp.)</td><td>> 30€</td><td>10-20€</td><td>< 10€</td></tr><tr><td>ROAS</td><td>< 1.5x</td><td>2-3x</td><td>> 4x</td></tr><tr><td>CPA (coût par achat)</td><td>> 50% prix vente</td><td>20-35%</td><td>< 20%</td></tr></tbody></table>
<h2>📱 Comprendre l'algorithme Meta Ads en 2025</h2>
<p>Meta Ads (Facebook + Instagram) a radicalement changé depuis 2021. L'algorithme est désormais piloté par l'IA de Meta, ce qui signifie que tu dois lui faire confiance plutôt que de sur-contrôler. Voici comment travailler avec l'algorithme plutôt que contre lui :</p>

<h2>🎯 Ciblage avancé : les audiences qui convertissent</h2>
<p>Avec iOS 14 et les restrictions de données, le ciblage par intérêts a perdu en précision. Voici la hiérarchie des audiences les plus efficaces aujourd'hui :</p>

</ol>
<div class="tip-box"><div class="tip-label">💡 Le pixel Meta : l'actif le plus précieux de ta boutique</div><p>Un pixel Meta "éduqué" avec 1 000+ achats enregistrés est capable de trouver tes clients futurs avec une précision remarquable. Chaque vente que génère ton pixel améliore ses performances futures. C'est pourquoi les boutiques qui ont 2-3 ans d'historique de pixels ont un avantage compétitif massif sur les nouvelles boutiques. Commence à nourrir ton pixel dès le premier jour.</p></div>

<h2>💰 Structure de campagne recommandée pour débuter</h2>

Objectif : Purchase<br>
Ensemble d'annonces 1 : Intérêts niche A (10€/jour)<br>
Ensemble d'annonces 2 : Intérêts niche B (10€/jour)<br>
Ensemble d'annonces 3 : Broad audience 25-45 ans France (10€/jour)<br>
Créas : 3-5 vidéos ou images différentes par ensemble</p>
<p>Après 3-5 jours : coupe les ensembles avec ROAS &lt; 1,5. Double le budget sur l'ensemble avec le meilleur ROAS. Teste de nouveaux créas chaque semaine.</p>
<div class="warn-box"><div class="tip-label">⚠️ Ne change jamais une campagne qui marche</div><p>Si une campagne génère un ROAS de 3,5x, résiste à l'envie d'optimiser. Chaque modification réinitialise la phase d'apprentissage et peut faire chuter les performances pendant 7 à 14 jours. La règle d'or : si ça marche, augmente uniquement le budget (maximum +20% par semaine) et ne touche à rien d'autre.</p></div>

<h2>🎬 Créer du contenu TikTok qui vend : la méthode UGC</h2>

<h2>📊 Comprendre et calculer ses métriques de rentabilité</h2>

</ol>

<p><strong>Q : Mon ROAS varie beaucoup d'un jour à l'autre. C'est normal ?</strong><br>Très normal. Le ROAS quotidien peut varier de 1x à 6x selon le jour de la semaine, les événements, la concurrence sur le CPM. C'est pourquoi on analyse toujours sur des périodes de 7 jours minimum (idéalement 14-30 jours) pour avoir des données statistiquement significatives. Le ROAS du lundi ne représente rien — le ROAS des 14 derniers jours, oui.</p>

<h2>Éléments CRO à Optimiser en Priorité</h2>
<p>Le CRO (Conversion Rate Optimization) consiste à maximiser le pourcentage de visiteurs qui réalisent l'action souhaitée. Voici les leviers les plus impactants :</p>

<h2>Heatmapping et Tests A/B</h2>
<p>Les heatmaps révèlent où vos visiteurs cliquent, scrollent et abandonnent. Couplés aux tests A/B, ils forment le duo gagnant du CRO :</p>
<ul style="padding-left:1.5rem;line-height:2">
<li><strong>Heatmap de clics</strong> : identifie les zones "fantômes" (cliqués mais non cliquables) et les éléments ignorés</li>
<li><strong>Scroll map</strong> : révèle où 50%, 75%, 90% des visiteurs s'arrêtent de scroller</li>
<li><strong>Session recordings</strong> : replay des sessions réelles pour identifier les frictions</li>
<li><strong>Test A/B</strong> : modifiez un seul élément à la fois (titre, CTA, image) et attendez la significativité statistique (95%)</li>
</ul>

<div class="tip-box">

h>Description</th><th>Impact LTV</th></tr></thead><tbody><tr><td>Programme de fidélité à points</td><td>Points sur chaque achat, échangeables contre réductions</td><td>+25-40%</td></tr><tr><td>Abonnement récurrent</td><td>Commande automatique sur consommables (café, compléments, cosmétiques)</td><td>+60-150%</td></tr><tr><td>Club VIP</td><td>Statut spécial : accès anticipé, livraison prioritaire, réductions exclusives</td><td>+30-50%</td></tr><tr><td>Email post-achat personnalisé</td><td>Séquence automatisée basée sur les achats précédents</td><td>+15-25%</td></tr><tr><td>Expérience unboxing mémorable</td><td>Packaging soigné + surprise = client qui revient et recommande</td><td>+20-35%</td></tr><tr><td>Programme parrainage</td><td>Récompense les clients qui amènent de nouveaux clients</td><td>+20-40% via acquisition gratuite</td></tr></tbody></table><h2>Apps Shopify pour la fidélisation</h2><table><thead><tr><th>App</th><th>Fonction principale</th><th>Prix</th></tr></thead><tbody><tr><td>Smile.io</td><td>Programme de points et parrainage</td><td>Gratuit → 49$/mois</td></tr><tr><td>Yotpo Loyalty</td><td>Points + VIP tiers + referral</td><td>19-199$/mois</td></tr><tr><td>Recharge Subscriptions</td><td>Abonnements récurrents pour consommables</td><td>99$/mois</td></tr><tr><td>Stamped.io</td><td>Avis + programme fidélité</td><td>23-149$/mois</td></tr></tbody></table><h2>Segmentation RFM pour cibler tes clients</h2><p>RFM = Recency (dernier achat), Frequency (fréquence), Monetary (montant). Segmente automatiquement dans Klaviyo :</p><ol><li><strong>Champions</strong> (achat récent, fréquent, montant élevé) : récompense-les, demande des avis, offre l'accès anticipé aux nouveautés</li><li><strong>À risque</strong> (bon historique mais inactifs 90 jours) : campagne win-back urgente avec offre limitée</li><li><strong>Nouveaux clients</strong> (1 achat récent) : séquence d'onboarding pour déclencher le 2ème achat</li><li><strong>Perdus</strong> (inactifs 180j+) : tentative ultime avec ton offre la plus forte, puis nettoyer la liste</li></ol>

ncer Google Shopping en parallèle de Meta</li><li>Activer TikTok Organic (3 vidéos/jour minimum)</li><li>Programme d'affiliation avec 5-10 micro-influenceurs</li></ol><p><strong>Semaines 9-12 : Scale agressif</strong></p><ol><li>Budget Meta × 2 sur les campagnes rentables</li><li>Expansion internationale (Belgique, Suisse, Canada FR)</li><li>Premiers emploi ou freelances (SAV, création de contenu)</li></ol><h2>Automatisation opérationnelle</h2><table><thead><tr><th>Tâche</th><th>Outil</th><th>Temps économisé/semaine</th></tr></thead><tbody><tr><td>Fulfillment commandes</td><td>DSers / AutoDS</td><td>5-10h</td></tr><tr><td>Service client basique</td><td>Tidio chatbot (IA)</td><td>3-6h</td></tr><tr><td>Emails marketing</td><td>Klaviyo flows</td><td>5-8h</td></tr><tr><td>Reporting analytics</td><td>Shopify Reports + Triple Whale</td><td>2-3h</td></tr><tr><td>Posts réseaux sociaux</td><td>Buffer / Later</td><td>3-5h</td></tr></tbody></table>
<h2>📈 Le cadre mental du scaling : changer de niveau, pas de stratégie</h2>
<p>Le passage de 1 000€ à 10 000€/mois n'est pas une question de "trouver le secret". C'est une question de systématiser ce qui fonctionne déjà à petite échelle. Trop d'e-commerçants cherchent une nouvelle tactique alors que la solution est d'amplifier ce qui marche déjà. Voici le framework :</p>
<p><strong>Les 4 leviers du scaling :</strong></p>
<ol>
<li><strong>Plus de trafic :</strong> Augmenter le budget pub, diversifier les canaux (Meta + TikTok + Google), SEO</li>
<li><strong>Meilleur taux de conversion :</strong> Optimiser les fiches produit, le checkout, les avis clients</li>
<li><strong>Panier moyen plus élevé :</strong> Upsells, bundles, seuil de livraison gratuite</li>
<li><strong>Plus de clients récurrents :</strong> Email marketing, programme de fidélité, abonnements</li>
</ol>
<p>La formule : CA = Trafic × Taux de conversion × Panier moyen × Fréquence d'achat. En améliorant chaque facteur de 20%, le CA triple. C'est le principe de la croissance par iteration.</p>
<table><thead><tr><th>Levier</th><th>Amélioration</th><th>Impact sur CA</th><th>Difficulté</th><th>Coût</th></tr></thead><tbody>

<tr><td>2ème achat +30%</td><td>Rétention x1.3</td><td>+30% CA</td><td>Modérée</td><td>Faible</td></tr>
</tbody></table>

<h2>⚡ Les étapes du scaling : de 1k à 10k€ en 90 jours</h2>
<p><strong>Phase 1 (Mois 1) — Consolider et optimiser :</strong><br>
Avant de scaler le budget pub, assure-toi que les fondamentaux sont solides : taux de conversion &gt; 2%, ROAS &gt; 3x, panier moyen optimisé avec au moins 1 upsell configuré. Si l'une de ces métriques est en dessous, corrige-la avant d'augmenter le budget. Scaler un business non-optimisé = perdre de l'argent plus vite.</p>
<p><strong>Phase 2 (Mois 2) — Augmenter graduellement le budget :</strong><br>
Règle d'or Meta Ads : n'augmente jamais le budget de plus de 20% en une seule fois. Au-delà, tu réinitialises la phase d'apprentissage et les performances chutent. Si tu as une campagne à 30€/jour qui fonctionne bien, passe à 36€, puis 43€, puis 52€ en augmentant chaque lundi.</p>
<p><strong>Phase 3 (Mois 3) — Diversifier les sources de trafic :</strong><br>
Quand Meta est stable, ajoute TikTok Ads (30€/jour de test). Puis Google Shopping (20€/jour). Puis retargeting sur toutes les plateformes. Cette diversification réduit ta dépendance à un seul canal et augmente ta portée totale.</p>
<div class="tip-box"><div class="tip-label">💡 Les CBO (Campaign Budget Optimization) pour scaler sans risque</div><p>Avec les CBO Meta, tu fixes un budget au niveau de la campagne et Meta distribue lui-même entre tes ensembles d'annonces selon les performances en temps réel. C'est la meilleure façon de scaler : tu augmentes un seul budget et l'IA optimise automatiquement. Exemple : 300€/jour en CBO sur 5 ensembles d'annonces. Meta alloue automatiquement plus sur les 2-3 ensembles les plus performants.</p></div>

<h2>🔧 Systématiser pour scaler : les processus indispensables</h2>
<p>Scaler sans systèmes, c'est construire sur du sable. Voici les processus à mettre en place avant de passer à 10 000€/mois :</p>
<ol>
<li><strong>SAV structuré :</strong> Templates de réponse pour les 10 questions les plus fréquentes. Objectif : répondre à 80% des emails en &lt; 2h. Outils : Gorgias (29€/mois) ou Freshdesk (gratuit).</li>

</ol>
<div class="warn-box"><div class="tip-label">⚠️ Les pièges du scaling trop rapide</div><p>Passer de 50€/jour à 500€/jour de pub en une semaine ne multiplie pas les ventes par 10. L'algorithme publicitaire ne fonctionne pas de manière linéaire. Au-delà d'un certain budget, le coût d'acquisition augmente parce que tu touches des audiences moins qualifiées. Scale intelligemment : double ton budget toutes les 2 semaines et surveille ton ROAS. Dès qu'il descend sous 2x, stabilise avant d'augmenter encore.</p></div>

. <strong>Avant/Après</strong> (transformation visible) — 3. <strong>Top 3 raisons d'acheter</strong> (liste rapide) — 4. <strong>Comparaison</strong> (ton produit vs l'alternative) — 5. <strong>Day in my life</strong> (intégration naturelle) — 6. <strong>Réponse à un commentaire</strong> (engagement communautaire) — 7. <strong>Duet/Stitch</strong> (rebondir sur une vidéo virale).</p></div><h2>Recruter des Créateurs UGC</h2><ol><li><strong>Plateforme Insense / Billo / Minea</strong> : places de marché pour commander des vidéos UGC à des créateurs</li><li><strong>TikTok Creator Marketplace</strong> : accès direct aux créateurs avec stats de performance</li><li><strong>Recrutement organique</strong> : commenter sur des vidéos de ta niche, proposer collab produit contre contenu</li><li><strong>Clients ambassadeurs</strong> : envoyer un produit gratuit à tes 10 meilleurs clients avec brief vidéo simple</li></ol><h2>Brief UGC Efficace</h2><table><thead><tr><th>Élément du Brief</th><th>Ce qu'il faut préciser</th></tr></thead><tbody><tr><td>Ton & style</td><td>Authentique / éducatif / entertainement / urgence</td></tr><tr><td>Format</td><td>Portrait 9:16, 30-60 sec, lumière naturelle</td></tr><tr><td>Messages clés</td><td>3 bénéfices produit maximum à mentionner</td></tr><tr><td>Mots interdits</td><td>Éviter les mentions de concurrents, prix exact</td></tr><tr><td>CTA requis</td><td>Phrase exacte pour l'appel à l'action</td></tr></tbody></table><div class="warn-box"><div class="warn-label">⚠️ Droits et Contrats UGC</div><p>Toujours obtenir une <strong>cession de droits écrite</strong> avant d'utiliser du contenu créé par quelqu'un d'autre en publicité payante. Sans cession de droits, tu ne peux pas booster la vidéo. Un simple contrat d'une page suffit — des templates gratuits existent sur Notion.</p></div><h2>FAQ — Contenu Viral</h2><p><strong>Faut-il montrer son visage dans les vidéos ?</strong><br>Non. De nombreuses boutiques à succès utilisent uniquement des mains qui montrent le produit, ou font des vidéos "satisfying" de déballage. L'anonymat est compatible avec le succès sur TikTok.</p><p><strong>Combien de vidéos poster par semaine ?</strong><br>3-7 vidéos par semaine minimum pour "nourrir" l'algorithme TikTok. La quantité prime sur la perfection au début. Poste, analyse, optimise.</p><p><strong>Quel matériel pour filmer ?</strong><br>Un iPhone récent et un anneau lumineux (ring light, ~30€) suffisent. La qualité du storytelling et de l'accroche compte bien plus que la résolution.</p>`

        content: `<h2>Le Live Commerce : Un Canal à 500 Milliards de Dollars</h2><div class="video-row"><a class="video-card" href="https://www.youtube.com/results?search_query=live+shopping+tiktok+how+to+sell+live+ecommerce+2025" target="_blank" rel="noopener noreferrer" style="display:block;text-decoration:none;color:inherit;"><div class="video-thumb"><img src="https://img.youtube.com/vi/7BKLfMRbpzI/mqdefault.jpg" onerror="this.parentNode.style.background='#1a1a2e';this.style.display='none'" alt="Live Shopping Guide" loading="lazy"><div class="play-overlay"><div class="play-btn">&#9654;</div></div></div><div class="video-info"><div class="video-title">Live Shopping TikTok – Stratégie et Meilleures Pratiques</div><span class="yt-link">&#9654; Voir sur YouTube</span></div></a></div><p>En Chine, le live commerce représente 25% de toutes les ventes e-commerce. En France, le marché émerge avec TikTok Live, Instagram Live Shopping et Amazon Live. Les marques qui se positionnent maintenant prendront une avance considérable. Un live bien préparé peut générer 5 000 à 50 000€ de ventes en une seule session.</p><h2>Structure d'un Live Shopping Efficace</h2><ol><li><strong>10 min avant</strong> : teaser sur story/feed, lien dans bio activé, stock vérifié</li><li><strong>0-5 min</strong> : accueil, présentation, règle du jeu (offre spéciale live)</li><li><strong>5-15 min</strong> : démonstration produit principale, FAQ en direct</li><li><strong>15-20 min</strong> : offre flash live (prix réduit ou bundle exclusif)</li><li><strong>20-25 min</strong> : témoignages, giveaway (augmente le reach), engagement communauté</li><li><strong>25-30 min</strong> : closing — annonce du prochain live, remerciements</li></ol><h2>Les Leviers de Conversion en Live</h2><table><thead><tr><th>Levier</th><th>Comment l'utiliser</th><th>Impact sur ventes</th></tr></thead><tbody><tr><td>Urgence temporelle</td><td>"Cette offre dure 10 min seulement"</td><td>+35% conversions</td></tr><tr><td>Quantité limitée</td><td>"Il reste 12 unités en stock"</td><td>+28% conversions</td></tr><tr><td>Bundle exclusif live</td><td>Produit A + B au prix de A</td><td>+42% panier moyen</td></tr><tr><td>Interaction directe</td><td>Répondre aux questions en direct</td><td>Confiance +60%</td></tr><tr><td>Promo code live</td><td>Code LIVE10 = 10% de réduction</td><td>Trackable et viral</td></tr></tbody></table><div class="tip-box"><div class="tip-label">💡 Setup Technique Minimum</div><p>Pour un live professionnel : smartphone fixé sur trépied, ring light (ou fenêtre lumineuse), fond neutre ou brandé, microphone-cravate filaire (20€), connexion WiFi stable. Tester TOUJOURS la connexion 15 min avant. Un live qui coupe = audience perdue.</p></div><div class="warn-box"><div class="warn-label">⚠️ Ce qu'il Faut Éviter en Live</div><p>Ne jamais : lire tes notes en live (perd la confiance), rester silencieux plus de 5 secondes (l'algo pénalise), promettre des choses impossibles à livrer, montrer un produit épuisé sans alternative. La préparation est la clé — faire une répétition complète avant le premier vrai live.</p></div><h2>FAQ — Live Shopping</h2><p><strong>Combien de spectateurs faut-il pour que le live soit rentable ?</strong><br>Avec un taux de conversion de 5% et un panier moyen de 40€, 100 spectateurs = 5 ventes = 200€. Même un petit live est rentable si ton offre est bien construite. L'important est de progresser à chaque session.</p><p><strong>Faut-il être à l'aise à l'oral ?</strong><br>L'authenticité prime sur la performance. Les lives "imparfaits" avec une vraie personnalité convertissent souvent mieux que les lives trop scriptés. Entraîne-toi en te filmant solo d'abord.</p><p><strong>Quelle fréquence de lives ?</strong><br>2-3 lives par semaine pour être poussé régulièrement par l'algorithme TikTok. Les créateurs qui livestreament quotidiennement ont un avantage algo significatif.</p>`
      }

</strong><br>Les prompts les plus efficaces donnent un contexte précis : ta niche, ta cible, tes contraintes (budget, logistique, marché). Plus tu es spécifique dans le prompt, plus l'IA est utile.</p><p><strong>L'IA remplace-t-elle un outil comme Minea ou Dropship.io ?</strong><br>Non, elle les complète. Minea donne des données réelles de performance pub; l'IA analyse et interprète ces données pour en extraire une stratégie. Utilise les deux ensemble.</p>`

t], format [bénéfice en gras] : [explication]"</td><td>Points de vente scannable</td></tr></tbody></table><div class="tip-box"><div class="tip-label">🚀 Workflow Fiche Produit en 8 Minutes</div><p>1. Photo produit → ChatGPT Vision : "Décris ce produit en détail" (2 min) — 2. Copier la description → Claude : "Réécris en fiche produit Shopify optimisée SEO en français" (3 min) — 3. Ajouter à Shopify, adapter le titre (3 min). Total : 8 min par produit au lieu de 45 min. Sur 100 produits = 62h économisées.</p></div><h2>Service Client Automatisé par IA</h2><ol><li><strong>Chatbot IA Shopify</strong> : applications comme Tidio AI, Gorgias AI, ou Zendesk AI répondent automatiquement aux questions fréquentes (statut commande, délais, remboursements)</li><li><strong>Templates de réponse IA</strong> : créer une bibliothèque de réponses types, l'IA personnalise pour chaque client</li><li><strong>Triage automatique</strong> : l'IA classe les tickets par urgence et type, les humains ne traitent que les cas complexes</li><li><strong>Analyse des sentiments</strong> : détecter automatiquement les clients frustrés et escalader en priorité</li></ol><h2>Automatisation Email Marketing IA</h2><table><thead><tr><th>Séquence</th><th>Ce que l'IA génère</th><th>Outil</th></tr></thead><tbody><tr><td>Bienvenue (3 emails)</td><td>Emails onboarding personnalisés selon la source d'acquisition</td><td>Klaviyo AI + ChatGPT</td></tr><tr><td>Abandon panier</td><td>Objet A/B testé, body adapté au produit abandonné</td><td>Klaviyo Smart Send</td></tr><tr><td>Post-achat</td><td>Email remerciement + upsell logique selon l'historique</td><td>GPT-4 + Klaviyo</td></tr><tr><td>Win-back</td><td>Offre personnalisée pour clients inactifs 90+ jours</td><td>Klaviyo Predictive Analytics</td></tr></tbody></table><h2>FAQ — Automatisation IA</h2><p><strong>Les textes générés par IA passent-ils les filtres anti-spam email ?</strong><br>Oui, si ils sont suffisamment personnalisés et que tu utilises un domaine d'envoi e 4 variantes de visuels produit lifestyle → choisir les 2 meilleures → AdCreative.ai formate pour toutes les tailles Meta/TikTok.<br>2. <strong>Copy</strong> : ChatGPT génère 10 accroches avec 3 angles différents (FOMO, bénéfice, storytelling) → tester les 3 meilleures en A/B.<br>3. <strong>Vidéo</strong> : CapCut IA assemble visuels + voix off ElevenLabs + sous-titres automatiques → pub vidéo pro en 20 min.</p></div><h2>Les Angles de Copy IA les Plus Performants</h2><table><thead><tr><th>Angle</th><th>Exemple pour un soin visage</th><th>Audience cible</th></tr></thead><tbody><tr><td>Problème → Solution</td><td>"Vous en avez marre des pores dilatés visibles ? Ce sérum les réduit de 47% en 21 jours."</td><td>Froide (prospection)</td></tr><tr><td>Résultat direct</td><td>"10 000 femmes ont déjà retrouvé leur éclat avec ce soin. Et si c'était votre tour ?"</td><td>Froide / Tiède</td></tr><tr><td>FOMO</td><td>"Plus que 47 unités disponibles. Notre stock ne sera pas réapprovisionné avant 6 semaines."</td><td>Tiède / Chaude</td></tr><tr><td>Éducation</td><td>"Pourquoi 78% des crèmes hydratantes ne fonctionnent pas (et comment choisir la bonne)"</td><td>Froide / Awareness</td></tr></tbody></table><div class="warn-box"><div class="warn-label">⚠️ Transparence et Réglementation IA</div><p>En Europe (AI Act 2025), les publicités générées par IA destinées à influencer les décisions d'achat devront bientôt être clairement identifiées. Anticipe cette régulation en gardant des assets originaux et en évitant les deep-fakes ou les fausses représentations de personnes réelles dans tes pubs.</p></div><h2>FAQ — IA Générative & Publicité</h2><p><strong>Les images IA sont-elles acceptées par Meta Ads ?</strong><br>Oui, tant qu'elles ne violent pas les politiques publicitaires (pas de fausses affirmations, pas de contenu trompeur). Plusieurs boutiques font 100% de leurs créatifs avec l'IA sans problème.</p><p><strong>Comment tester rapidement quelle approche IA fonctionne ?</strong><br>Commencer avec un budget de 5-10€/jour par variante sur Meta. Après 3 jours et 50+ impressions par variante, couper les perdants et scaler les gagnants. L'IA permet de tester 10x plus de variantes pour le même budget.</p><p><strong>Les créatifs IA ont-ils le même impact que les vrais visuels ?</strong><br>Pour les produits physiques, les vrais visuels convertissent souvent mieux en bas de funnel. L'IA excelle pour le haut de funnel (awareness) et les variantes de test. Idéalement : vrais visuels + IA pour la volumétrie de tests.</p>`

function buildSidebar() {
  const nav = document.getElementById('sbNav');
  nav.innerHTML = '';
  COURSE.modules.forEach(function(mod, mi) {
    const wrapper = document.createElement('div');
    wrapper.className = 'mod-block';
    wrapper.dataset.mi = mi;

    const lvlCls = { free:'mb-free', pro:'mb-pro', elite:'mb-elite' }[mod.level] || 'mb-free';
    const lvlLbl = { free: currentLang === 'fr' ? 'GRATUIT' : 'FREE', pro:'PRO', elite:'ELITE' }[mod.level] || '';

    const hdr = document.createElement('div');
    hdr.className = 'mod-hdr';
    hdr.innerHTML =
      '<span class="mod-arrow open">▶</span>' +
      '<span class="mod-icon ic-' + mod.level + '">' + mod.icon + '</span>' +
      '<span class="mod-name">' + (mod['name_' + currentLang] || mod.name) + '</span>' +
      '<span class="mod-badge ' + lvlCls + '">' + lvlLbl + '</span>';
    hdr.onclick = function() {
      const aw = hdr.querySelector('.mod-arrow');
      const lw = wrapper.querySelector('.mod-lessons');
      aw.classList.toggle('open');
      lw.classList.toggle('open');
    };

    const lesWrap = document.createElement('div');
    lesWrap.className = 'mod-lessons open';

    mod.lessons.forEach(function(les, li) {
      const key = mi + '_' + li;
      const isDone = !!done[key];
      const locked = !canAccess(les.level);

      const row = document.createElement('div');
      row.className = 'les-row' + (locked ? ' locked' : '');
      row.dataset.mi = mi;
      row.innerHTML =
        '<span class="les-chk' + (isDone ? ' done' : '') + '">' + (isDone ? '&#10003;' : '') + '</span>' +
        '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (les["title_" + currentLang] || les.title) + '</span>' +
        '<span class="les-dur">' + les.dur + '</span>' +
        (locked ? '<span class="les-lock">&#128274;</span>' : '');

      if (!locked) {
        row.onclick = function() { loadLesson(mi, li); if(window.innerWidth<=768) closeSidebar(); };
      }
      lesWrap.appendChild(row);
    });

    wrapper.appendChild(hdr);
    wrapper.appendChild(lesWrap);
    nav.appendChild(wrapper);
  });
  updateProgress();
}

function setActiveRow(mi, li) {
  document.querySelectorAll('.les-row').forEach(function(r) { r.classList.remove('active'); });

function updateProgress() {
  const total = COURSE.modules.reduce(function(s, m) { return s + m.lessons.filter(function(l) { return canAccess(l.level); }).length; }, 0);
  const comp = Object.keys(done).length;
  const pct = total ? Math.round(comp / total * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progTxt').textContent = comp + '/' + total;
}

function toggleDone(mi, li) {
  const key = mi + '_' + li;
  if (done[key]) delete done[key]; else done[key] = 1;
  localStorage.setItem(DONE_KEY, JSON.stringify(done));
  const rows = document.querySelectorAll('.les-row[data-mi="' + mi + '"]');
  const row = rows[li];
  if (row) {
    const chk = row.querySelector('.les-chk');
    if (done[key]) { chk.classList.add('done'); chk.textContent = '\u2713'; }
    else { chk.classList.remove('done'); chk.textContent = ''; }
  }
  const btn = document.getElementById('markDoneBtn');
  if (btn) { btn.className = 'mark-done' + (done[key] ? ' done' : ''); btn.textContent = done[key] ? (currentLang === 'fr' ? '✓ Terminé' : '✓ Completed') : (currentLang === 'fr' ? '○ Marquer terminé' : '○ Mark complete'); }
  updateProgress();
}

@keyframes dsh-out{to{transform:translateY(110%)}}
.dh-handle{width:48px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;margin-bottom:4px;}
.dh-icon-wrap{width:76px;height:76px;border-radius:24px;background:linear-gradient(145deg,#6366f1 0%,#8b5cf6 100%);display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 16px 40px rgba(99,102,241,.55),0 0 0 1px rgba(255,255,255,.12) inset;}
.dh-title{font-size:23px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1.1;}
.dh-sub{font-size:14.5px;color:rgba(255,255,255,.52);line-height:1.6;text-align:center;max-width:265px;margin-top:-8px;}
.hint-timer{position:relative;width:54px;height:54px;}
.hint-timer svg{width:54px;height:54px;transform:rotate(-90deg);}
.hint-track{fill:none;stroke:rgba(255,255,255,.1);stroke-width:4;}
.hint-ring{fill:none;stroke:rgba(180,180,255,.75);stroke-width:4;stroke-linecap:round;stroke-dasharray:150.8;stroke-dashoffset:0;animation:hint-cd 3s linear forwards;}
@keyframes hint-cd{from{stroke-dashoffset:0}to{stroke-dashoffset:150.8}}
.hint-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:15px;font-weight:700;color:#fff;}
</style>
<script>(function(){
  if(window.innerWidth>768)return;
  if(sessionStorage.getItem('dsk_hint'))return;
  sessionStorage.setItem('dsk_hint','1');
  function show(){
    var ov=document.createElement('div');ov.id='dsk-overlay';document.body.appendChild(ov);
    var el=document.createElement('div');el.id='desktop-hint';
    el.innerHTML='<div class="dh-handle"></div><div class="dh-icon-wrap">🖥️</div><div class="dh-title">Better on Desktop</div><div class="dh-sub">This site is designed for desktop. For the best experience, open it on your computer.</div><div class="hint-timer"><svg viewBox="0 0 54 54"><circle class="hint-track" cx="27" cy="27" r="24"/><circle class="hint-ring" cx="27" cy="27" r="24"/></svg><span class="hint-num">3</span></div>';
    document.body.appendChild(el);
    var n=3,numEl=el.querySelector('.hint-num'),iv=setInterval(function(){n--;if(numEl)numEl.textContent=n>0?n:'';if(n<=0)clearInterval(iv);},1000);
    setTimeout(function(){el.classList.add('hide');ov.classList.add('hide');setTimeout(function(){el.remove();ov.remove();},400);},3000);
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',show);}else{show();}
})();</script>
</body>
</html>
