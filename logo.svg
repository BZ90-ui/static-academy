<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0c4f5"/>
      <stop offset="100%" stop-color="#8085d8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d0d4ff"/>
      <stop offset="100%" stop-color="#9096e8"/>
    </linearGradient>
  </defs>

  <!-- Icon: hexagon wireframe logo (46x52 area) -->
  <!-- Outer hexagon — pointy top/bottom, centered at (23, 26), radius ~22 -->
  <polygon
    points="23,4 42,15 42,37 23,48 4,37 4,15"
    stroke="url(#lineGrad)" stroke-width="2" stroke-linejoin="round" fill="none"
    filter="url(#glow)"/>
  <!-- Left leg: top → bottom-left -->
  <line x1="23" y1="4" x2="4" y2="37"
    stroke="url(#lineGrad)" stroke-width="1.6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Right leg: top → bottom-right -->
  <line x1="23" y1="4" x2="42" y2="37"
    stroke="url(#lineGrad)" stroke-width="1.6" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Diagonal topLeft → bottomRight -->
  <line x1="4" y1="15" x2="42" y2="37"
    stroke="url(#lineGrad)" stroke-width="1.4" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  <!-- Diagonal topRight → bottomLeft -->
  <line x1="42" y1="15" x2="4" y2="37"
    stroke="url(#lineGrad)" stroke-width="1.4" stroke-linecap="round" opacity="0.7" filter="url(#glow)"/>
  <!-- Crossbar -->
  <line x1="12.5" y1="32" x2="33.5" y2="32"
    stroke="url(#lineGrad)" stroke-width="1.4" stroke-linecap="round" opacity="0.6" filter="url(#glow)"/>
  <!-- Glow dots at key vertices -->
  <circle cx="23" cy="4"  r="1.8" fill="#c8ccf8" filter="url(#glow2)" opacity="0.9"/>
  <circle cx="42" cy="15" r="1.4" fill="#a0a5e8" filter="url(#glow2)" opacity="0.7"/>
  <circle cx="42" cy="37" r="1.4" fill="#a0a5e8" filter="url(#glow2)" opacity="0.7"/>
  <circle cx="23" cy="48" r="1.8" fill="#c8ccf8" filter="url(#glow2)" opacity="0.9"/>
  <circle cx="4"  cy="37" r="1.4" fill="#a0a5e8" filter="url(#glow2)" opacity="0.7"/>
  <circle cx="4"  cy="15" r="1.4" fill="#a0a5e8" filter="url(#glow2)" opacity="0.7"/>

  <!-- Divider -->
  <line x1="58" y1="10" x2="58" y2="42" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Wordmark -->
  <text x="68" y="23"
    font-family="'Space Grotesk','Inter','Segoe UI',sans-serif"
    font-weight="800" font-size="16" letter-spacing="0.08em"
    fill="url(#textGrad)">STATIC</text>
  <text x="68" y="40"
    font-family="'Space Grotesk','Inter','Segoe UI',sans-serif"
    font-weight="500" font-size="11.5" letter-spacing="0.18em"
    fill="rgba(160,165,232,0.75)">ACADEMY</text>
</svg>
